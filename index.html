<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 시계 클론</title>
    <style>
        /* 1. 전체 레이아웃 리셋 및 배경 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", Dotum, sans-serif;
        }
        body {
            background-color: #f5f6f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 2. 네이버 스타일 시계 컨테이너 */
        .clock-container {
            background-color: #ffffff;
            border: 1px solid #e4e8eb;
            border-radius: 8px;
            padding: 30px 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 400px;
        }

        /* 네이버 로고 스타일 */
        .logo {
            font-size: 22px;
            font-weight: 900;
            color: #03cf5d; /* 네이버 시그니처 그린 */
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .title {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        /* 3. 날짜 및 시간 표시 영역 */
        .date-display {
            font-size: 16px;
            color: #202020;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .time-display {
            font-size: 42px;
            font-weight: bold;
            color: #03cf5d;
            font-family: 'Courier New', Courier, monospace; /* 숫자가 움직여도 가로폭 고정 */
            letter-spacing: 1px;
            background-color: #f9f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        /* 4. 시간 조정 컨트롤러 영역 */
        .control-panel {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #e4e8eb;
            text-align: left;
        }
        .control-title {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-apply {
            background-color: #03cf5d;
            color: white;
        }
        .btn-apply:hover { background-color: #02b852; }
        .btn-reset {
            background-color: #777;
            color: white;
        }
        .btn-reset:hover { background-color: #666; }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="logo">NAVER</div>
        <div class="title">시계 클론</div>
        
        <div class="date-display" id="dateDisplay">0000년 00월 00일 (요일)</div>
        <div class="time-display" id="timeDisplay">00:00:00</div>

        <div class="control-panel">
            <div class="control-title">⏱ 시간 조정하기</div>
            <div class="input-group">
                <input type="datetime-local" id="timeInput">
            </div>
            <div class="btn-group">
                <button class="btn btn-apply" onclick="applyCustomTime()">설정 적용</button>
                <button class="btn btn-reset" onclick="resetToCurrentTime()">현재시간 리셋</button>
            </div>
        </div>
    </div>

    <script>
        // 시간을 흐르게 만들기 위한 전역 변수
        let timeOffset = 0; // PC 현재 시간과 사용자 설정 시간의 차이(밀리초)
        let useCustomTime = false; // 사용자가 커스텀 시간을 적용 중인지 여부

        // 1자리 숫자를 2자리 숫자 문자열로 바꿔주는 함수 (예: 9 -> "09")
        function padZero(num) {
            return String(num).padStart(2, '0');
        }

        // 화면에 날짜와 시간을 업데이트하는 핵심 함수
        function updateClock() {
            // 기준이 되는 기본 현재 시간
            let targetTime = new Date();

            // 만약 사용자가 시간을 변경했다면, 그 차이값(offset)을 더해서 기준 시간을 계산
            if (useCustomTime) {
                targetTime = new Date(Date.now() + timeOffset);
            }

            // 년, 월, 일, 요일 추출
            const year = targetTime.getFullYear();
            const month = padZero(targetTime.getMonth() + 1); // 월은 0부터 시작하므로 +1
            const date = padZero(targetTime.getDate());
            
            const dayList = ['일', '월', '화', '수', '목', '금', '토'];
            const day = dayList[targetTime.getDay()];

            // 시, 분, 초 추출
            const hours = padZero(targetTime.getHours());
            const minutes = padZero(targetTime.getMinutes());
            const seconds = padZero(targetTime.getSeconds());

            // DOM 객체에 텍스트 대입 (화면 갱신)
            document.getElementById('dateDisplay').textContent = `${year}년 ${month}월 ${date}일 (${day}요일)`;
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // 사용자가 입력한 시간으로 시계를 고정하고 흐르게 만드는 함수
        function applyCustomTime() {
            const inputVal = document.getElementById('timeInput').value;
            
            if (!inputVal) {
                alert("조정할 날짜와 시간을 입력해주세요.");
                return;
            }

            const userSelectedTime = new Date(inputVal); // 사용자가 인풋창에 선택한 시간 객체 생성
            const actualCurrentTime = new Date();        // 실제 현재 물리 시간

            // 핵심 로직: 실제 시간과 유저가 바꾼 시간의 '차이값'을 구함
            timeOffset = userSelectedTime.getTime() - actualCurrentTime.getTime();
            useCustomTime = true; // 커스텀 모드 활성화

            updateClock(); // 즉시 화면 반영
        }

        // 다시 실제 현재 시간으로 되돌리는 함수
        function resetToCurrentTime() {
            useCustomTime = false;
            timeOffset = 0;
            document.getElementById('timeInput').value = ''; // 입력창 비우기
            updateClock(); // 즉시 화면 반영
        }

        // 1초(1000밀리초)마다 주기적으로 updateClock 함수를 실행하여 시계를 작동시킴
        setInterval(updateClock, 1000);

        // 페이지가 처음 로드될 때도 지연 없이 즉시 시간을 띄우기 위해 한 번 실행
        updateClock();
    </script>
</body>
</html>
